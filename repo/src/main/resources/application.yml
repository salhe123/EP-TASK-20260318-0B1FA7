spring:
  datasource:
    url: jdbc:mysql://localhost:3306/anju_db?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 1800000
    refresh-token-expiry: 604800000
  storage:
    path: ./storage
  security:
    secondary-verification: true
    secure-cookies: false
    cors:
      allowed-origins: http://localhost:3000,http://localhost:8080
