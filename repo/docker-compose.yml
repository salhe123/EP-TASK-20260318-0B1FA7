services:
  mysql:
    image: mysql:8.0
    container_name: anju-mysql
    environment:
      MYSQL_ROOT_PASSWORD: anju_root_pass
      MYSQL_DATABASE: anju_db
      MYSQL_USER: anju_user
      MYSQL_PASSWORD: anju_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/conf.d:/etc/mysql/conf.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anju-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/anju_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: anju_user
      SPRING_DATASOURCE_PASSWORD: anju_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: change-this-to-a-secure-random-string-in-production
    volumes:
      - app-storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
  app-storage:
